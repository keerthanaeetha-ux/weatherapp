<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Professional Weather</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Video background element -->
    <video autoplay muted loop id="bgVideo" class="background-video">
        <source src="" id="videoSource" type="video/mp4">
    </video>

    <div class="container">
        <div class="search-box">
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" placeholder="Enter your location" id="cityInput">
            <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="weather-body" id="weatherBody">
            <img src="https://openweathermap.org/img/wn/10d@2x.png" alt="Weather Icon" class="weather-icon" id="weatherIcon">
            <h1 class="temp" id="temperature">--°C</h1>
            <h2 class="description" id="description">Weather</h2>
            
            <div class="weather-details">
                <div class="humidity">
                    <i class="fa-solid fa-droplet"></i>
                    <div class="text">
                        <span id="humidity">--%</span>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="wind">
                    <i class="fa-solid fa-wind"></i>
                    <div class="text">
                        <span id="windSpeed">-- Km/H</span>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="not-found" id="notFound">
            <p>Oops! Location not found.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
